<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Case Brief Generator</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f8;margin:0}header{background:#111;color:#fff;padding:16px 24px}.wrap{max-width:1100px;margin:auto;padding:20px}.card{background:#fff;padding:20px;margin:15px 0;border-left:5px solid #1a56db}.field{margin:12px 0}.field label{display:block;font-weight:bold;margin-bottom:5px}input,textarea,select{width:100%;padding:10px;box-sizing:border-box}textarea{min-height:90px}.warn{background:#fff3cd;border-left:5px solid #b45309;padding:12px;margin:12px 0}.issue{border:2px solid #1a56db;padding:15px;margin:15px 0}.btn{background:#1a56db;color:#fff;border:none;padding:10px 18px;cursor:pointer;margin:5px}.output{background:#fff;border:2px solid #111;padding:20px;white-space:pre-wrap}
</style>
</head>
<body>
<header><h1>Interactive Case Brief Generator</h1></header>
<div class="wrap">
<div class="card">
<h2>Case Information</h2>
<div class="field"><label>Case Name</label><input id="caseName"></div>
<div class="field"><label>Citation</label><input id="citation"></div>
<div class="field"><label>Court</label><input id="court"></div>
<div class="field"><label>Year</label><input id="year"></div>
<div class="field"><label>Procedural Posture</label><textarea id="posture"></textarea></div>
<div class="warn"><strong>Common 1L Mistake:</strong> Procedural posture explains how the case reached this court. Disposition explains what the court did with the case.</div>
<div class="field"><label>Case-Level Disposition</label><select id="caseDisp"><option></option><option>Affirmed</option><option>Reversed</option><option>Vacated</option><option>Remanded</option><option>Reversed and Remanded</option><option>Affirmed in Part and Reversed in Part</option></select></div>
</div>
<div class="card"><h2>Facts</h2><textarea id="facts"></textarea></div>
<div class="card"><h2>Issues</h2><div id="issues"></div><button class="btn" onclick="addIssue()">Add Issue</button></div>
<div class="card"><h2>Analysis</h2>
<div class="field"><label>Concurrence</label><textarea id="conc"></textarea></div>
<div class="field"><label>Dissent</label><textarea id="dissent"></textarea></div>
<div class="field"><label>Significance</label><textarea id="sig"></textarea></div>
<div class="field"><label>Student Analysis</label><textarea id="analysis"></textarea></div>
<div class="field"><label>Most Important Lesson</label><textarea id="lesson"></textarea></div>
</div>
<button class="btn" onclick="generate()">Generate Case Brief</button>
<button class="btn" onclick="window.print()">Print / Save PDF</button>
<div id="output" class="output"></div>
</div>
<script>
let count=0;
function addIssue(){count++;let d=document.createElement('div');d.className='issue';d.innerHTML=`<h3>Issue ${count}</h3><div class='warn'><strong>Holding</strong> = answer to the legal question. <strong>Disposition</strong> = what the court did with the case.</div><label>Issue</label><textarea class='issueQ'></textarea><label>Holding</label><textarea class='holding'></textarea><label>Disposition</label><select class='disp'><option></option><option>Affirmed</option><option>Reversed</option><option>Vacated</option><option>Remanded</option><option>Reversed and Remanded</option></select><label>Rule of Law</label><textarea class='rule'></textarea><label>Court Reasoning</label><textarea class='reason'></textarea><p><input type='checkbox'> Holding answers issue question<br><input type='checkbox'> Disposition is procedural action<br><input type='checkbox'> I understand they are different</p>`;document.getElementById('issues').appendChild(d);save();}
function generate(){let txt=`CASE BRIEF\n\nCase: ${caseName.value}\nCitation: ${citation.value}\nCourt: ${court.value}\nYear: ${year.value}\n\nPROCEDURAL POSTURE\n${posture.value}\n\nCASE DISPOSITION\n${caseDisp.value}\n\nFACTS\n${facts.value}\n\n`;document.querySelectorAll('.issue').forEach((i,n)=>{txt+=`ISSUE ${n+1}\n${i.querySelector('.issueQ').value}\n\nHOLDING\n${i.querySelector('.holding').value}\n\nDISPOSITION\n${i.querySelector('.disp').value}\n\nRULE OF LAW\n${i.querySelector('.rule').value}\n\nREASONING\n${i.querySelector('.reason').value}\n\n`;});txt+=`CONCURRENCE\n${conc.value||'None'}\n\nDISSENT\n${dissent.value||'None'}\n\nSIGNIFICANCE\n${sig.value}\n\nSTUDENT ANALYSIS\n${analysis.value}\n\nMOST IMPORTANT LESSON\n${lesson.value}`;output.textContent=txt;save();}
function save(){localStorage.setItem('caseBriefGen',document.body.innerHTML)}
addIssue();
</script>
</body></html>
